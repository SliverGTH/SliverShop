<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ยืนยันการสั่งซื้อ - Silver Gallery</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">

  <div class="checkout-wrapper">

    <div class="profile-topbar">
      <a href="/" class="logo"><span class="logo-icon">💍</span><span>Silver Gallery</span></a>
      <a href="/" class="btn-login" style="text-decoration:none">← กลับร้าน</a>
    </div>

    <div class="checkout-layout">

      <!-- Order Summary -->
      <div class="checkout-card">
        <h2 class="profile-section-title" style="margin-top:0">รายการสินค้า</h2>
        <div id="checkoutItems"></div>
        <div class="checkout-total-row">
          <span>รวมทั้งหมด</span>
          <span id="checkoutTotal" class="checkout-total-price">฿0</span>
        </div>
      </div>

      <!-- Shipping Form -->
      <div class="checkout-card">
        <h2 class="profile-section-title" style="margin-top:0">ข้อมูลการจัดส่ง</h2>

        <div class="alert hidden" id="checkoutAlert"></div>

        <form id="checkoutForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label>ชื่อผู้รับ *</label>
              <input type="text" id="cName" required />
            </div>
            <div class="form-group">
              <label>เบอร์โทรศัพท์ *</label>
              <input type="tel" id="cPhone" placeholder="08X-XXX-XXXX" required />
            </div>
          </div>

          <div class="form-group full">
            <label>บ้านเลขที่ / ซอย / ถนน *</label>
            <input type="text" id="cStreet" placeholder="เช่น 123/4 ซ.สุขุมวิท" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>แขวง / ตำบล</label>
              <input type="text" id="cDistrict" placeholder="แขวง/ตำบล" />
            </div>
            <div class="form-group">
              <label>เขต / อำเภอ *</label>
              <input type="text" id="cCity" placeholder="เขต/อำเภอ" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>จังหวัด *</label>
              <input type="text" id="cProvince" placeholder="จังหวัด" required />
            </div>
            <div class="form-group">
              <label>รหัสไปรษณีย์ *</label>
              <input type="text" id="cPostalCode" placeholder="10110" maxlength="5" required />
            </div>
          </div>

          <div class="form-group full">
            <label>หมายเหตุ (ไม่บังคับ)</label>
            <textarea id="cNote" rows="2" placeholder="เช่น โทรก่อนจัดส่ง, ฝากไว้ที่เพื่อนบ้าน..."></textarea>
          </div>

          <div class="checkout-payment-box">
            <span class="payment-icon">💵</span>
            <div>
              <strong>ชำระเงินปลายทาง (COD)</strong>
              <p style="margin:4px 0 0;color:var(--text-muted);font-size:.875rem">ชำระเงินสดเมื่อได้รับสินค้า</p>
            </div>
          </div>

          <button type="submit" class="btn-save" id="placeOrderBtn" style="width:100%;margin-top:16px">
            <span id="placeOrderTxt">ยืนยันการสั่งซื้อ</span>
            <span id="placeOrderSpinner" class="spinner hidden"></span>
          </button>
        </form>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/common.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
